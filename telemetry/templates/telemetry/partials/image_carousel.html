<div id="image-carousel-container" class="relative group w-full mx-auto">
  {% if image %}
    <img src="{{ image.image_url }}" alt="Balloon Image" class="w-full h-auto rounded-lg shadow-md object-cover aspect-video">
    
    <div class="absolute inset-0 flex items-center justify-between px-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
      <button 
        hx-get="{% url 'get_balloon_image' balloon.balloon_id %}?current_id={{ image.id }}&dir=prev"
        hx-target="#image-carousel-container"
        hx-swap="outerHTML"
        class="bg-black/50 hover:bg-black/75 text-white font-bold py-2 px-4 rounded-full focus:outline-none focus:ring-2 focus:ring-white backdrop-blur-sm shadow-lg transition-colors">
        Back
      </button>
      
      <button 
        hx-get="{% url 'get_balloon_image' balloon.balloon_id %}?current_id={{ image.id }}&dir=next"
        hx-target="#image-carousel-container"
        hx-swap="outerHTML"
        class="bg-black/50 hover:bg-black/75 text-white font-bold py-2 px-4 rounded-full focus:outline-none focus:ring-2 focus:ring-white backdrop-blur-sm shadow-lg transition-colors">
        Next
      </button>
    </div>
  {% else %}
    <div class="w-full h-64 bg-gray-800 rounded-lg flex items-center justify-center text-gray-400 border border-gray-700 shadow-inner">
      No images available
    </div>
  {% endif %}
</div>
