<div id="image-carousel-container" class="relative group w-full mx-auto"
     {% if not manual_override %}
     hx-get="{% url 'get_balloon_image' balloon.balloon_id %}" 
     hx-trigger="every 5s" 
     hx-swap="outerHTML"
     {% endif %}>
  {% if image %}
    <div class="text-center mb-2 flex justify-center items-center relative">
      <p class="text-sm font-medium text-slate-700">{{ image.filename|default:"Image" }}</p>
    </div>
    
    <div class="relative">
        <img src="{{ image.image_url }}" alt="Balloon Image" class="w-full h-auto rounded-lg shadow-md object-cover aspect-video" style="transform: rotate({{ image.rotation }}deg);">
        
        {% if manual_override %}
        <div class="absolute top-4 left-4 z-10">
            <button 
                hx-get="{% url 'get_balloon_image' balloon.balloon_id %}"
                hx-target="#image-carousel-container"
                hx-swap="outerHTML"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow-lg transition-colors text-sm flex items-center gap-2">
                Go to Latest
            </button>
        </div>
        {% endif %}

        <div class="absolute inset-0 flex items-center justify-between px-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none">
          <button 
            hx-get="{% url 'get_balloon_image' balloon.balloon_id %}?current_id={{ image.id }}&dir=prev&manual_override=true"
            hx-target="#image-carousel-container"
            hx-swap="outerHTML"
            class="pointer-events-auto bg-black/50 hover:bg-black/75 text-white font-bold py-2 px-4 rounded-full focus:outline-none focus:ring-2 focus:ring-white backdrop-blur-sm shadow-lg transition-colors">
            Back
          </button>
          
          <button 
            hx-get="{% url 'get_balloon_image' balloon.balloon_id %}?current_id={{ image.id }}&dir=next&manual_override=true"
            hx-target="#image-carousel-container"
            hx-swap="outerHTML"
            class="pointer-events-auto bg-black/50 hover:bg-black/75 text-white font-bold py-2 px-4 rounded-full focus:outline-none focus:ring-2 focus:ring-white backdrop-blur-sm shadow-lg transition-colors">
            Next
          </button>
        </div>

        <!-- Rotate buttons -->
        <div class="absolute top-4 right-4 flex flex-col space-y-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
          <button 
            hx-get="{% url 'rotate_balloon_image' image.id %}?direction=counterclockwise&manual_override={{ manual_override|yesno:'true,false' }}"
            hx-target="#image-carousel-container"
            hx-swap="outerHTML"
            class="bg-black/50 hover:bg-black/75 text-white font-bold py-2 px-3 rounded-full focus:outline-none focus:ring-2 focus:ring-white backdrop-blur-sm shadow-lg transition-colors text-sm"
            title="Rotate Counterclockwise">
            ↺
          </button>
          <button 
            hx-get="{% url 'rotate_balloon_image' image.id %}?direction=clockwise&manual_override={{ manual_override|yesno:'true,false' }}"
            hx-target="#image-carousel-container"
            hx-swap="outerHTML"
            class="bg-black/50 hover:bg-black/75 text-white font-bold py-2 px-3 rounded-full focus:outline-none focus:ring-2 focus:ring-white backdrop-blur-sm shadow-lg transition-colors text-sm"
            title="Rotate Clockwise">
            ↻
          </button>
        </div>
    </div>
  {% else %}
    <div class="w-full h-64 bg-gray-800 rounded-lg flex items-center justify-center text-gray-400 border border-gray-700 shadow-inner">
      No images available
    </div>
  {% endif %}
</div>
