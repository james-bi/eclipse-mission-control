<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse Mission Control - Balloon Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- HTMX Client-Side Templates Extension -->
    <script src="https://unpkg.com/htmx.org/dist/ext/client-side-templates.js"></script>
    <!-- Mustache for templating -->
    <script src="https://unpkg.com/mustache@latest"></script>
</head>
<body class="bg-slate-100 min-h-screen p-8 font-sans">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">Eclipse Mission Control</h1>
            <p class="text-slate-500 mt-2 text-lg">High-Altitude Balloon Telemetry Dashboard</p>
        </header>

        <!-- Balloon Fleet List -->
        <div class="mb-10">
            <h2 class="text-2xl font-bold text-slate-800 mb-4">Balloon Fleet</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                {% for balloon in balloons %}
                <a href="{% url 'balloon_detail' balloon.balloon_id %}" class="bg-white rounded-xl shadow border border-slate-200 p-6 flex justify-between items-center hover:shadow-lg transition-shadow cursor-pointer">
                    <h3 class="text-lg font-bold text-slate-800">{{ balloon.name }}</h3>
                    <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider text-white {% if balloon.status in 'IN_FLIGHT,active' %}bg-emerald-500{% else %}bg-slate-400{% endif %}">
                        {% if balloon.status in 'IN_FLIGHT,active' %}Active{% else %}Inactive{% endif %}
                    </span>
                </a>
                {% empty %}
                <div class="col-span-full text-center text-slate-500 py-8 bg-white rounded-xl shadow-sm border border-slate-200 border-dashed">
                    No balloons launched yet.
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- Container polling the JSON endpoint via HTMX and rendering via Mustache -->
        <div hx-ext="client-side-templates">
            <div hx-get="/api/telemetry/" 
                 hx-trigger="load, every 30s" 
                 hx-swap="innerHTML"
                 mustache-template="balloon-template"
                 class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Data will be loaded here -->
                <div class="col-span-full text-center text-slate-400 py-10">
                    Loading telemetry data...
                </div>
            </div>
            
            <template id="balloon-template">
                {% verbatim %}
                {{#telemetry}}
                <div class="bg-white rounded-xl shadow-lg border border-slate-200 p-6 flex flex-col transition-all hover:shadow-xl">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-xl font-bold text-slate-800">{{name}}</h2>
                            <p class="text-sm font-medium text-slate-500">ID: {{balloon_id}}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider text-white
                            {{#is_active}}bg-emerald-500{{/is_active}}
                            {{^is_active}}bg-rose-500{{/is_active}}">
                            {{status}}
                        </span>
                    </div>
                    
                    <!-- Carousel container -->
                    <div hx-get="/get_balloon_image/{{balloon_id}}/" hx-trigger="load" class="mb-6"></div>

                    <div class="space-y-4 flex-grow">
                        <div>
                            <p class="text-sm font-semibold text-slate-400 uppercase tracking-wide">Altitude</p>
                            <p class="text-2xl font-black text-slate-700">{{altitude}} <span class="text-sm font-medium text-slate-500">m</span></p>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Location</p>
                                <p class="text-sm font-bold text-slate-700">{{latitude}}&deg;</p>
                                <p class="text-sm font-bold text-slate-700">{{longitude}}&deg;</p>
                            </div>
                            <div>
                                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Environment</p>
                                <p class="text-sm font-bold text-slate-700">{{temperature}}&deg;C</p>
                                <p class="text-sm font-bold text-slate-700">{{battery_level}}%</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-slate-100 flex items-center justify-between">
                        <span class="text-xs font-medium text-slate-400">Last updated:</span>
                        <span class="text-xs font-bold text-slate-600">{{timestamp}}</span>
                    </div>
                </div>
                {{/telemetry}}
                {% endverbatim %}
            </template>
        </div>
    </div>
</body>
</html>
